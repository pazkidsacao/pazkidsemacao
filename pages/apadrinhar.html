<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apadrinhar Criança</title>

    <link rel="stylesheet" href="/css/apadrinhar.css">
</head>

<body>

    <main class="container">

        <!-- VOLTAR -->
        <button class="btn-voltar" onclick="history.back()">
            ← Voltar
        </button>

        <!-- CARD DA CRIANÇA -->
        <section class="card-crianca">

            <img id="foto-crianca" src="/imagens/default.png" alt="Foto da criança">

            <div class="info-crianca">

                <h1 id="nome-crianca">Carregando...</h1>

                <p id="idade-crianca"></p>

                <div class="tags">
                    <span id="blusa"></span>
                    <span id="calca"></span>
                    <span id="calcado"></span>
                </div>

                <p class="texto" id="texto-crianca"></p>

            </div>

        </section>

        <!-- FORMULÁRIO PADRINHO -->
        <section class="formulario">

            <h2>Seus dados</h2>

            <input type="text" id="nome" placeholder="Seu nome">
            <input type="text" id="cpf" placeholder="Seu CPF">
            
            <input type="tel" id="telefone" placeholder="Telefone">
            <input type="email" id="email" placeholder="seuemail@exemplo.com">
            <select id="campus">
                <option value="">Selecione um Campus</option>
                <option value="Analia">Anália Franco</option>
                <option value="Eldorado">Eldorado</option>
                <option value="Guaruhos">Guarulhos</option>
                <option value="Sao Caetano">São Caetano</option>
                <option value="Sao Miguel">São Miguel Paulista</option>
                <option value="Outras Paz">Outra Paz Church</option>
                <option value="Outras Igrejas">Outra Igreja</option>
            </select>
            <br>
            <p>Obs: Seu CPF será usado apenas para sua consulta às crianças apadrinhadas.</p>

            <button id="btn-confirmar">
                Confirmar Apadrinhamento
            </button>

        </section>

    </main>

    <script type="module" src="/js/apadrinhar.js"></script>

</body>
</html>
