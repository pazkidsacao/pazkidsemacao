<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Consulta de Apadrinhamento</title>

    <link rel="stylesheet" href="../css/consulta-acampa.css">
</head>

<body>
    <button class="btn-voltar" id="btn-voltar">
        ← Voltar
    </button>

    <div class="container">

        <div class="logo">
            <img src="../imagens/pazAcao.png" alt="Logo ONG Paz em Ação">
        </div>

        <h1>🔎 Meu Apadrinhamento</h1>

        <p class="sub">
            Consulte aqui os dados da criança e o status do seu apadrinhamento
        </p>

        <!-- BUSCA -->
        <div class="busca">
            <input type="text" id="cpf" placeholder="Digite seu CPF">
            <button id="btn-buscar">Buscar</button>
        </div>

        <!-- RESULTADO -->
        <div id="resultado"></div>

    </div>

    <script type="module" src="../js/consulta-acampa.js"></script>

</body>

</html>
