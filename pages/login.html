<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Paz Kids em Ação</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="/css/login.css">
</head>


<body>

    <main class="pagina-login">

        <div class="cartao-login">

            <img src="/imagens/pazAcao.png"
                 alt="Logo"
                 class="logo-login">

            <h1>Área Administrativa</h1>

            <form id="formLogin">

                <label>Login</label>
                <input
                    type="email"
                    id="email"
                    required>

                <label>Senha</label>
                <input
                    type="password"
                    id="senha"
                    required>

                <button type="submit">
                    Entrar
                </button>

            </form>

            <p id="mensagem"></p>

        </div>

    </main>
    <script type="module" src="/js/login.js"></script>

</body>
